<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimScout">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>SwimScout</title>
<style>
  :root {
    --bg: #0a1628;
    --surface: #111d35;
    --surface2: #1a2a45;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8edf5;
    --text2: #8899bb;
    --text3: #556688;
    --accent: #3b8de0;
    --accent2: #1a6bc4;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    overscroll-behavior: none;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0 16px;
    display: flex; align-items: center; gap: 0;
    height: 52px;
  }
  .nav-logo {
    font-size: 17px; font-weight: 700; color: var(--text);
    margin-right: auto; letter-spacing: -0.3px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab {
    padding: 6px 12px; font-size: 13px; border-radius: var(--radius-sm);
    border: none; background: none; color: var(--text2); cursor: pointer;
    transition: all 0.15s;
  }
  .nav-tab.active { background: var(--surface2); color: var(--text); }

  /* MAIN */
  .main { max-width: 680px; margin: 0 auto; padding: 16px; }

  /* CARDS */
  .card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text3); margin-bottom: 12px;
  }

  /* FORM */
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--text2); }
  .field input, .field select {
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 10px 12px;
    color: var(--text); font-size: 14px; width: 100%;
    -webkit-appearance: none; appearance: none;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  details summary {
    font-size: 13px; color: var(--text2); cursor: pointer;
    padding: 8px 0; list-style: none; display: flex; align-items: center; gap: 6px;
  }
  details summary::before { content: '▸'; font-size: 10px; transition: transform 0.2s; }
  details[open] summary::before { transform: rotate(90deg); }
  details .field { margin-top: 8px; }

  /* BUTTONS */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s; width: 100%;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { background: var(--accent2); transform: scale(0.98); }
  .btn-ghost {
    background: var(--surface2); color: var(--text2);
    border: 0.5px solid var(--border2);
  }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn-ghost { width: auto; padding: 12px 16px; }

  /* SPINNER */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATUS */
  .status-bar {
    font-size: 12px; color: var(--text2);
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding: 0 2px;
  }

  /* ATHLETE CARDS */
  .ath-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px; overflow: hidden;
    transition: border-color 0.15s;
  }
  .ath-card.open { border-color: var(--accent); }
  .ath-header {
    padding: 14px 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .ath-header:active { background: var(--surface2); }
  .ath-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .ath-sub { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .ath-id { font-size: 10px; color: var(--text3); font-family: monospace; margin-top: 2px; }
  .ath-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pb-count {
    font-size: 11px; background: var(--surface2); color: var(--text2);
    padding: 3px 8px; border-radius: 99px; border: 0.5px solid var(--border2);
  }
  .chevron {
    font-size: 12px; color: var(--text3);
    transition: transform 0.2s; display: inline-block;
  }
  .ath-card.open .chevron { transform: rotate(180deg); }

  /* PB TABLE */
  .ath-body {
    display: none; border-top: 0.5px solid var(--border);
    padding: 12px 16px;
  }
  .ath-card.open .ath-body { display: block; }

  .pb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pb-table th {
    font-size: 11px; color: var(--text3); font-weight: 500;
    text-align: left; padding: 0 8px 8px 0; border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
  }
  .pb-table td {
    padding: 8px 8px 8px 0; border-bottom: 0.5px solid var(--border);
    vertical-align: top;
  }
  .pb-table tr:last-child td { border-bottom: none; }
  .tempo { font-weight: 700; font-family: monospace; font-size: 14px; color: var(--text); }
  .spec-btn {
    background: none; border: none; color: var(--accent);
    font-size: 13px; cursor: pointer; text-align: left; padding: 0;
    font-family: inherit;
  }
  .spec-btn:hover { text-decoration: underline; }
  .evento-btn {
    background: none; border: none; color: var(--text2);
    font-size: 11px; cursor: pointer; text-align: left; padding: 0;
    font-family: inherit; line-height: 1.3;
  }
  .evento-btn:hover { color: var(--text); }

  /* STORICO PANEL */
  .storico-panel {
    margin-top: 10px; background: var(--surface2);
    border-radius: var(--radius-sm); padding: 12px;
    border: 0.5px solid var(--border2);
  }
  .storico-title {
    font-size: 11px; color: var(--text3); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
  }

  /* EVENTO PANEL */
  .evento-panel {
    margin-top: 10px; background: var(--surface2);
    border-radius: var(--radius-sm); padding: 12px;
    border: 0.5px solid var(--border2);
  }
  .evento-title {
    font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px;
  }

  /* GRADUATORIE */
  .grad-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .grad-table th {
    font-size: 11px; color: var(--text3); font-weight: 500;
    text-align: left; padding: 0 8px 8px 0; border-bottom: 0.5px solid var(--border);
    white-space: nowrap;
  }
  .grad-table td {
    padding: 8px 8px 8px 0; border-bottom: 0.5px solid var(--border);
    vertical-align: top;
  }
  .grad-table tr:last-child td { border-bottom: none; }

  /* PAGINATION */
  .pagination {
    display: flex; justify-content: center; align-items: center;
    gap: 8px; margin-top: 16px; font-size: 13px; color: var(--text2);
  }
  .page-btn {
    background: var(--surface2); border: 0.5px solid var(--border2);
    color: var(--text); padding: 8px 14px; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px;
  }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* EMPTY / ERROR */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--text2); font-size: 14px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }
  .error-box {
    background: rgba(239,68,68,0.1); border: 0.5px solid rgba(239,68,68,0.3);
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 13px; color: #fca5a5;
  }

  /* PILL */
  .pill {
    display: inline-block; font-size: 10px; padding: 2px 7px;
    border-radius: 99px; font-weight: 600;
  }
  .pill-m { background: rgba(59,141,224,0.15); color: #60a5fa; }
  .pill-f { background: rgba(236,72,153,0.15); color: #f472b6; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 0.5px solid var(--border2);
    color: var(--text); padding: 10px 18px; border-radius: 99px;
    font-size: 13px; z-index: 999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* MOBILE */
  @media (max-width: 480px) {
    .grid3 { grid-template-columns: 1fr 1fr; }
    .pb-table th:nth-child(4), .pb-table td:nth-child(4) { display: none; }
    .main { padding: 12px; }
  }
</style>
</head>

<script>
const PROXY = 'https://swimscout.1450125.xyz/api';

let athPage = 1, gradPage = 1;

// ── UTILS ──────────────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  event.currentTarget.classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setLoading(btnIconId, btnTextId, loading, defaultIcon, defaultText) {
  const icon = document.getElementById(btnIconId);
  const text = document.getElementById(btnTextId);
  if (loading) {
    icon.outerHTML = `<div class="spinner" id="${btnIconId}"></div>`;
    text.textContent = 'Carico...';
  } else {
    const spinner = document.getElementById(btnIconId);
    if (spinner) spinner.outerHTML = `<span id="${btnIconId}">${defaultIcon}</span>`;
    text.textContent = defaultText;
  }
}

async function callProxy(view, params, page = 1) {
  const resp = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ view, params, page })
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function parseHTML(html) {
  const d = new DOMParser();
  return d.parseFromString(html, 'text/html');
}

function stagToAnno(stag) {
  if (!stag || stag === '0') return stag;
  return String(parseInt(stag) + 1);
}

// ── ATLETI ─────────────────────────────────────────────────────────────
function resetAtleti() {
  ['a-cognome','a-nome','a-dalyob','a-alyob','a-daleta','a-aleta','a-dal','a-al'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('a-sesso').value = '';
  document.getElementById('a-vasca').value = '2';
  document.getElementById('a-stagione').value = '2025';
  document.getElementById('a-codice-gara').value = '';
  document.getElementById('a-comitato').value = '';
  document.getElementById('a-all').value = '0';
  document.getElementById('atleti-results').style.display = 'none';
}

async function searchAtleti(page) {
  athPage = page;
  const stag = document.getElementById('a-stagione').value;
  const anno = stagToAnno(stag);
  const params = {
    sesso: document.getElementById('a-sesso').value,
    id_lunghezza_vasca: document.getElementById('a-vasca').value,
    kindtime: '1',
    stagione: stag === '0' ? '' : stag,
    anno: anno === '0' ? '' : anno,
    dal: document.getElementById('a-dal').value,
    al: document.getElementById('a-al').value,
    settore: 'NUO',
    dalyob: document.getElementById('a-dalyob').value,
    alyob: document.getElementById('a-alyob').value,
    daleta: document.getElementById('a-daleta').value,
    aleta: document.getElementById('a-aleta').value,
    cognome: document.getElementById('a-cognome').value,
    nome: document.getElementById('a-nome').value,
    codice_gara: document.getElementById('a-codice-gara').value,
    all: document.getElementById('a-all').value,
    id_comitato: document.getElementById('a-comitato').value,
    limit: '20',
    id_atleta: ''
  };

  setLoading('a-btn-icon', 'a-btn-text', true, '🔍', 'Cerca');
  const resEl = document.getElementById('atleti-results');
  const listEl = document.getElementById('atleti-list');
  const statusEl = document.getElementById('atleti-status');
  const pagesEl = document.getElementById('atleti-pages');
  resEl.style.display = 'block';
  listEl.innerHTML = '';
  pagesEl.innerHTML = '';
  statusEl.innerHTML = '<span style="color:var(--text2)">Ricerca in corso...</span>';

  try {
    const data = await callProxy('gratleta', params, page);
    if (data.status !== 'OK') throw new Error('Risposta FIN non valida');
    const doc = parseHTML(data.content || '');
    const athletes = parseAthletes(doc);
    statusEl.innerHTML = `<span>${athletes.length} atleti trovati</span><span style="font-size:11px;color:var(--text3)">Tap per espandere</span>`;
    listEl.innerHTML = athletes.length ? athletes.map((a, i) => renderAthCard(a, i)).join('') : '<div class="empty"><div class="empty-icon">🏊</div>Nessun atleta trovato</div>';
    if (athletes.length >= 20) {
      pagesEl.innerHTML = `
        <button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="searchAtleti(${page-1})">← Prec</button>
        <span>Pag. ${page}</span>
        <button class="page-btn" onclick="searchAtleti(${page+1})">Succ →</button>`;
    }
  } catch(e) {
    statusEl.innerHTML = '';
    listEl.innerHTML = `<div class="error-box">Errore: ${e.message}<br><small style="opacity:0.7;margin-top:4px;display:block;">Verifica che il Worker Cloudflare sia deployato correttamente.</small></div>`;
  }
  setLoading('a-btn-icon', 'a-btn-text', false, '🔍', 'Cerca');
}

function parseAthletes(doc) {
  const out = [];
  doc.querySelectorAll('.scheda_atleta').forEach(s => {
    const a = {
      nome: s.querySelector('.nome')?.textContent?.trim() || '',
      nascita: s.querySelector('.data_nascita')?.textContent?.replace(/[()]/g,'').trim() || '',
      societa: s.querySelector('.societa')?.textContent?.trim() || '',
      id: s.querySelector('input[name="solr[id_atleta]"]')?.value || '',
      pbs: []
    };
    s.querySelectorAll('.personalbest .row').forEach(row => {
      const specEl = row.querySelector('.specialita .collegamento');
      const luogoEl = row.querySelector('.luogo .collegamento');
      const evEl = row.querySelector('.evento .collegamento');
      a.pbs.push({
        spec: specEl?.textContent?.trim() || '',
        codice: specEl?.dataset?.id || '',
        tempo: row.querySelector('.tempo span')?.textContent?.trim() || '',
        data: row.querySelector('.data span')?.textContent?.trim() || '',
        luogo: luogoEl?.textContent?.trim() || '',
        evento: evEl?.textContent?.trim() || '',
        idEvento: evEl?.dataset?.id?.split(';')[0] || '',
      });
    });
    if (a.nome || a.id) out.push(a);
  });
  return out;
}

function renderAthCard(a, i) {
  const pbRows = a.pbs.map(pb => `
    <tr>
      <td><button class="spec-btn" onclick="loadStorico(${i},'${a.id}','${pb.codice}','${pb.spec.replace(/'/g,"\\'")}',this)">${pb.spec}</button></td>
      <td><span class="tempo">${pb.tempo}</span></td>
      <td style="white-space:nowrap;font-size:12px;color:var(--text2)">${pb.data}</td>
      <td><button class="evento-btn" onclick="loadEvento(${i},'${a.id}','${pb.codice}','${pb.idEvento}',this)">${pb.luogo}<br>${pb.evento.substring(0,40)}${pb.evento.length>40?'…':''}</button></td>
    </tr>`).join('');

  return `<div class="ath-card" id="ath-${i}">
    <div class="ath-header" onclick="toggleAth(${i})">
      <div style="min-width:0">
        <div class="ath-name">${a.nome}</div>
        <div class="ath-sub">${[a.societa, a.nascita].filter(Boolean).join(' · ')}</div>
        ${a.id ? `<div class="ath-id">ID ${a.id}</div>` : ''}
      </div>
      <div class="ath-right">
        <span class="pb-count">${a.pbs.length} PB</span>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="ath-body">
      ${a.pbs.length ? `
      <div style="overflow-x:auto">
        <table class="pb-table">
          <thead><tr><th>Specialità</th><th>PB</th><th>Data</th><th>Gara</th></tr></thead>
          <tbody>${pbRows}</tbody>
        </table>
      </div>` : '<div style="font-size:13px;color:var(--text2)">Nessun PB registrato</div>'}
      <div id="ath-detail-${i}"></div>
    </div>
  </div>`;
}

function toggleAth(i) {
  const card = document.getElementById('ath-' + i);
  card.classList.toggle('open');
}

async function loadStorico(i, athId, codice, specName, btn) {
  const detail = document.getElementById('ath-detail-' + i);
  const key = `storico-${athId}-${codice}`;
  if (detail.dataset.open === key) {
    detail.innerHTML = '';
    detail.dataset.open = '';
    return;
  }
  detail.innerHTML = '<div class="storico-panel" style="color:var(--text2);font-size:13px;display:flex;align-items:center;gap:8px;"><div class="spinner"></div>Carico storico ' + specName + '...</div>';
  const stag = document.getElementById('a-stagione').value;
  const params = {
    sesso: document.getElementById('a-sesso').value || 'M',
    id_lunghezza_vasca: document.getElementById('a-vasca').value,
    kindtime: '1',
    stagione: '', anno: '',
    dal: '', al: '', settore: 'NUO',
    dalyob: '', alyob: '', daleta: '', aleta: '',
    cognome: '', nome: '',
    codice_gara: codice,
    all: '1',
    id_comitato: '',
    limit: '50',
    id_atleta: athId
  };
  try {
    const data = await callProxy('grspecialitaatleta', params);
    const doc = parseHTML(data.content || '');
    const rows = [];
    doc.querySelectorAll('.row').forEach(row => {
      const tempo = row.querySelector('.tempo span')?.textContent?.trim();
      const d = row.querySelector('.data span')?.textContent?.trim();
      const l = row.querySelector('.luogo .collegamento')?.textContent?.trim() || row.querySelector('.luogo span')?.textContent?.trim();
      const ev = row.querySelector('.evento .collegamento')?.textContent?.trim() || '';
      if (tempo) rows.push({tempo, data: d, luogo: l, evento: ev});
    });
    if (rows.length) {
      detail.innerHTML = `<div class="storico-panel">
        <div class="storico-title">Storico ${specName} · ${rows.length} prestazioni · tap specialità per chiudere</div>
        <div style="overflow-x:auto">
          <table class="pb-table">
            <thead><tr><th>Tempo</th><th>Data</th><th>Luogo</th><th>Evento</th></tr></thead>
            <tbody>${rows.map(r=>`<tr>
              <td><span class="tempo">${r.tempo}</span></td>
              <td style="white-space:nowrap;font-size:12px;color:var(--text2)">${r.data||''}</td>
              <td style="font-size:12px">${r.luogo||''}</td>
              <td style="font-size:11px;color:var(--text2)">${r.evento||''}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
      detail.dataset.open = key;
    } else {
      detail.innerHTML = `<div class="storico-panel" style="color:var(--text2);font-size:13px;">Nessuno storico disponibile.</div>`;
    }
  } catch(e) {
    detail.innerHTML = `<div class="error-box">Errore storico: ${e.message}</div>`;
  }
}

async function loadEvento(i, athId, codice, idEvento, btn) {
  if (!idEvento) { toast('ID evento non disponibile'); return; }
  const detail = document.getElementById('ath-detail-' + i);
  const key = `evento-${idEvento}-${codice}`;
  if (detail.dataset.open === key) {
    detail.innerHTML = '';
    detail.dataset.open = '';
    return;
  }
  detail.innerHTML = '<div class="evento-panel" style="color:var(--text2);font-size:13px;display:flex;align-items:center;gap:8px;"><div class="spinner"></div>Carico dettaglio gara...</div>';
  const stag = document.getElementById('a-stagione').value;
  const params = {
    sesso: document.getElementById('a-sesso').value || 'M',
    id_lunghezza_vasca: document.getElementById('a-vasca').value,
    kindtime: '1',
    stagione: stag === '0' ? '' : stag,
    anno: stagToAnno(stag) === '0' ? '' : stagToAnno(stag),
    dal: '', al: '', settore: 'NUO',
    dalyob: '', alyob: '', daleta: '', aleta: '',
    cognome: '', nome: '',
    codice_gara: codice,
    all: '0',
    id_comitato: '',
    limit: '50',
    id_atleta: athId,
    id_evento: idEvento
  };
  try {
    const data = await callProxy('grevento', params);
    const doc = parseHTML(data.content || '');
    const rows = [];
    doc.querySelectorAll('.row').forEach(row => {
      const gara = row.querySelector('.specialita span')?.textContent?.trim() || row.querySelector('.gara span')?.textContent?.trim();
      const tempo = row.querySelector('.tempo span')?.textContent?.trim();
      const atleta = row.querySelector('.atleta span')?.textContent?.trim() || row.querySelector('.nome span')?.textContent?.trim();
      const anno = row.querySelector('.anno span')?.textContent?.trim();
      const soc = row.querySelector('.societa span')?.textContent?.trim();
      const luogo = row.querySelector('.luogo span')?.textContent?.trim();
      const data2 = row.querySelector('.data span')?.textContent?.trim();
      if (tempo) rows.push({gara, tempo, atleta, anno, soc, luogo, data: data2});
    });
    const title = doc.querySelector('h3, .titolo, .evento-nome')?.textContent?.trim() || 'Risultati gara';
    if (rows.length) {
      detail.innerHTML = `<div class="evento-panel">
        <div class="evento-title">${title}</div>
        <div style="overflow-x:auto">
          <table class="grad-table">
            <thead><tr><th>Gara</th><th>Tempo</th><th>Atleta</th><th>Anno</th><th>Società</th></tr></thead>
            <tbody>${rows.map(r=>`<tr>
              <td style="font-size:12px">${r.gara||''}</td>
              <td><span class="tempo">${r.tempo}</span></td>
              <td style="font-size:12px">${r.atleta||''}</td>
              <td style="font-size:12px;color:var(--text2)">${r.anno||''}</td>
              <td style="font-size:11px;color:var(--text2)">${r.soc||''}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
      detail.dataset.open = key;
    } else {
      detail.innerHTML = `<div class="evento-panel" style="color:var(--text2);font-size:13px;">Nessun risultato disponibile per questo evento.</div>`;
    }
  } catch(e) {
    detail.innerHTML = `<div class="error-box">Errore evento: ${e.message}</div>`;
  }
}

// ── GRADUATORIE ─────────────────────────────────────────────────────────
async function searchGraduatorie(page) {
  gradPage = page;
  const stag = document.getElementById('g-stagione').value;
  const anno = stagToAnno(stag);
  const params = {
    sesso: document.getElementById('g-sesso').value,
    id_lunghezza_vasca: document.getElementById('g-vasca').value,
    kindtime: '1',
    stagione: stag === '0' ? '' : stag,
    anno: anno === '0' ? '' : anno,
    dal: '', al: '', settore: 'NUO',
    dalyob: document.getElementById('g-dalyob').value,
    alyob: document.getElementById('g-alyob').value,
    daleta: '', aleta: '',
    cognome: '', nome: '',
    codice_gara: document.getElementById('g-codice-gara').value,
    all: '0',
    id_comitato: document.getElementById('g-comitato').value,
    limit: '20',
    id_atleta: ''
  };

  setLoading('g-btn-icon', 'g-btn-text', true, '🏆', 'Cerca graduatorie');
  const resEl = document.getElementById('grad-results');
  const listEl = document.getElementById('grad-list');
  const statusEl = document.getElementById('grad-status');
  const pagesEl = document.getElementById('grad-pages');
  resEl.style.display = 'block';
  listEl.innerHTML = '';
  pagesEl.innerHTML = '';
  statusEl.innerHTML = '<span style="color:var(--text2)">Carico...</span>';

  try {
    const data = await callProxy('grricerca', params, page);
    if (data.status !== 'OK') throw new Error('Risposta FIN non valida');
    const doc = parseHTML(data.content || '');
    const rows = [];
    doc.querySelectorAll('.row').forEach(row => {
      const gara = row.querySelector('.specialita span, .gara span')?.textContent?.trim();
      const tempo = row.querySelector('.tempo span')?.textContent?.trim();
      const atleta = row.querySelector('.atleta span, .nome span')?.textContent?.trim();
      const anno2 = row.querySelector('.anno span')?.textContent?.trim();
      const soc = row.querySelector('.societa span')?.textContent?.trim();
      const data2 = row.querySelector('.data span')?.textContent?.trim();
      const luogo = row.querySelector('.luogo span, .luogo .collegamento')?.textContent?.trim();
      if (tempo) rows.push({gara, tempo, atleta, anno: anno2, soc, data: data2, luogo});
    });
    statusEl.innerHTML = `<span>${rows.length} risultati</span>`;
    if (rows.length) {
      listEl.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
        <div style="overflow-x:auto">
          <table class="grad-table" style="padding:0;">
            <thead style="padding:0 16px">
              <tr style="padding:0 16px">
                <th style="padding:12px 8px 12px 16px">Gara</th>
                <th style="padding:12px 8px">Tempo</th>
                <th style="padding:12px 8px">Atleta</th>
                <th style="padding:12px 8px">Anno</th>
                <th style="padding:12px 8px">Società</th>
                <th style="padding:12px 16px 12px 8px">Luogo · Data</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r=>`<tr>
                <td style="padding:10px 8px 10px 16px;font-size:12px">${r.gara||''}</td>
                <td style="padding:10px 8px"><span class="tempo">${r.tempo}</span></td>
                <td style="padding:10px 8px;font-size:13px;font-weight:500">${r.atleta||''}</td>
                <td style="padding:10px 8px;font-size:12px;color:var(--text2)">${r.anno||''}</td>
                <td style="padding:10px 8px;font-size:11px;color:var(--text2)">${r.soc||''}</td>
                <td style="padding:10px 16px 10px 8px;font-size:11px;color:var(--text2)">${r.luogo||''}${r.data?'<br>'+r.data:''}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
      if (rows.length >= 20) {
        pagesEl.innerHTML = `
          <button class="page-btn" ${page<=1?'disabled':''} onclick="searchGraduatorie(${page-1})">← Prec</button>
          <span>Pag. ${page}</span>
          <button class="page-btn" onclick="searchGraduatorie(${page+1})">Succ →</button>`;
      }
    } else {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div>Nessun risultato trovato</div>';
    }
  } catch(e) {
    statusEl.innerHTML = '';
    listEl.innerHTML = `<div class="error-box">Errore: ${e.message}</div>`;
  }
  setLoading('g-btn-icon', 'g-btn-text', false, '🏆', 'Cerca graduatorie');
}

// ── ENTER KEY ───────────────────────────────────────────────────────────
['a-cognome','a-nome'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') searchAtleti(1);
  });
});

  navigator.serviceWorker.register('sw.js').catch(() => {});
}

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimScout">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>SwimScout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0a1628;--surface:#111d35;--surface2:#1a2a45;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e8edf5;--text2:#8899bb;--text3:#556688;
  --accent:#3b8de0;--accent2:#1a6bc4;
  --green:#22c55e;--red:#ef4444;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overscroll-behavior:none;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;gap:0;}
.nav-logo{font-size:17px;font-weight:700;margin-right:auto;letter-spacing:-0.3px;}
.nav-logo span{color:var(--accent);}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:6px 12px;font-size:13px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text2);cursor:pointer;}
.nav-tab.active{background:var(--surface2);color:var(--text);}

/* VIEWS */
.view{display:none;}.view.active{display:block;}
.main{max-width:680px;margin:0 auto;padding:16px;}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:12px;}

/* FORM */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.field label{font-size:12px;color:var(--text2);}
.field input,.field select{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;width:100%;-webkit-appearance:none;outline:none;}
.field input::placeholder{color:var(--text3);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
details summary{font-size:13px;color:var(--text2);cursor:pointer;padding:8px 0;list-style:none;display:flex;align-items:center;gap:6px;}
details summary::before{content:'▸';font-size:10px;transition:transform .2s;}
details[open] summary::before{transform:rotate(90deg);}
details .field{margin-top:8px;}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;width:100%;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{background:var(--accent2);transform:scale(.98);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);}
.btn-row{display:flex;gap:8px;}
.btn-row .btn-ghost{width:auto;padding:12px 16px;}

/* SPINNER */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* STATUS */
.status-bar{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 2px;}

/* ATHLETE LIST CARDS */
.ath-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.ath-card:hover{border-color:var(--border2);}
.ath-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.ath-name{font-size:15px;font-weight:600;}
.ath-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.ath-arrow{font-size:14px;color:var(--text3);}

/* ATHLETE DETAIL PAGE */
.ath-page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;}
.ath-page.open{display:block;}
.ath-page-inner{max-width:680px;margin:0 auto;padding:16px;}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;padding:8px 0 16px;font-family:inherit;}
.back-btn:active{color:var(--text);}
.ath-hero{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;}
.ath-avatar{width:48px;height:48px;border-radius:50%;background:rgba(59,141,224,0.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--accent);flex-shrink:0;}
.ath-hero-name{font-size:17px;font-weight:600;margin:0 0 3px;}
.ath-hero-meta{font-size:12px;color:var(--text2);margin:0;}

/* PB GRID */
.pb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px;}
.pb-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.pb-card.active{border-color:var(--accent);}
.pb-card:hover{border-color:var(--border2);}
.pb-card .pb-spec{font-size:11px;color:var(--text2);margin:0 0 4px;}
.pb-card .pb-time{font-size:15px;font-weight:500;font-family:monospace;margin:0;}

/* CHART */
.chart-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.chart-title{font-size:14px;font-weight:500;}
.vasca-toggle{display:flex;gap:4px;}
.vtoggle{font-size:12px;padding:4px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:none;cursor:pointer;color:var(--text2);}
.vtoggle.active{background:rgba(59,141,224,0.15);color:var(--accent);border-color:var(--accent);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-card{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;}
.stat-label{font-size:11px;color:var(--text2);margin:0 0 4px;}
.stat-val{font-size:16px;font-weight:500;margin:0;font-family:monospace;}

/* RESULTS LIST */
.results-list{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px;}
.results-list table{width:100%;border-collapse:collapse;font-size:13px;}
.results-list th{font-size:11px;color:var(--text3);font-weight:500;padding:8px 12px;border-bottom:0.5px solid var(--border);text-align:left;}
.results-list td{padding:8px 12px;border-bottom:0.5px solid var(--border);}
.results-list tr:last-child td{border-bottom:none;}
.pb-badge{font-size:10px;background:rgba(34,197,94,0.15);color:var(--green);padding:2px 6px;border-radius:99px;margin-left:6px;}
.loading-chart{display:flex;align-items:center;justify-content:center;gap:10px;height:200px;color:var(--text2);font-size:13px;}

/* EMPTY / ERROR */
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;}
.empty-icon{font-size:32px;margin-bottom:8px;}
.error-box{background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:#fca5a5;}

/* PAGINATION */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;font-size:13px;color:var(--text2);}
.page-btn{background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;}
.page-btn:disabled{opacity:.3;cursor:default;}

/* GRAD TABLE */
.grad-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.grad-wrap table{width:100%;border-collapse:collapse;font-size:13px;}
.grad-wrap th{font-size:11px;color:var(--text3);font-weight:500;text-align:left;padding:10px 12px;border-bottom:0.5px solid var(--border);}
.grad-wrap td{padding:9px 12px;border-bottom:0.5px solid var(--border);}
.grad-wrap tr:last-child td{border-bottom:none;}
.tempo-mono{font-weight:500;font-family:monospace;font-size:14px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:99px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:480px){.grid3{grid-template-columns:1fr 1fr;}.main{padding:12px;}.ath-page-inner{padding:12px;}.stats-row{grid-template-columns:1fr 1fr;}}
</style>
</head>

<!-- ATHLETE DETAIL PAGE -->

<script>
const PROXY = 'https://swimscout.1450125.xyz/api';
let athPage = 1, gradPage = 1;
let chartInst = null;
let currentAthlete = null;
let currentVasca = 50;
let currentCodice = null;

function showView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  if (btn) btn.classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setLoading(id, loading, defaultText) {
  const btn = document.getElementById(id);
  if (!btn) return;
  if (loading) {
    btn.innerHTML = '<div class="spinner"></div> Carico...';
    btn.disabled = true;
  } else {
    btn.innerHTML = defaultText;
    btn.disabled = false;
  }
}

async function callProxy(view, params, page = 1) {
  const resp = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ view, params, page })
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

function parseHTML(html) {
  return new DOMParser().parseFromString(html, 'text/html');
}

function stagToAnno(s) {
  if (!s || s === '0') return '';
  return String(parseInt(s) + 1);
}

function timeToSec(t) {
  if (!t) return null;
  t = t.toString().trim();
  if (t.includes(':')) {
    const [m, s] = t.split(':');
    return parseFloat(m) * 60 + parseFloat(s);
  }
  return parseFloat(t);
}

function secToTime(s) {
  if (s >= 60) {
    const m = Math.floor(s / 60);
    const sec = (s % 60).toFixed(2).padStart(5, '0');
    return m + ':' + sec;
  }
  return s.toFixed(2);
}

function parseItalianDate(str) {
  if (!str) return '';
  const months = { 'Gennaio':1,'Febbraio':2,'Marzo':3,'Aprile':4,'Maggio':5,'Giugno':6,'Luglio':7,'Agosto':8,'Settembre':9,'Ottobre':10,'Novembre':11,'Dicembre':12 };
  const parts = str.trim().split(' ');
  if (parts.length === 3) {
    const d = parts[0].padStart(2,'0');
    const m = String(months[parts[1]] || 1).padStart(2,'0');
    const y = parts[2];
    return y + '-' + m + '-' + d;
  }
  return str;
}

// ── ATLETI ──────────────────────────────────────────────
function resetAtleti() {
  ['a-cognome','a-nome','a-dalyob','a-alyob'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('a-sesso').value = '';
  document.getElementById('a-vasca').value = '2';
  document.getElementById('a-stagione').value = '2025';
  document.getElementById('a-codice-gara').value = '';
  document.getElementById('a-comitato').value = '';
  document.getElementById('atleti-results').style.display = 'none';
}

async function searchAtleti(page) {
  athPage = page;
  const stag = document.getElementById('a-stagione').value;
  const params = {
    sesso: document.getElementById('a-sesso').value,
    id_lunghezza_vasca: document.getElementById('a-vasca').value,
    kindtime: '1',
    stagione: stag === '0' ? '' : stag,
    anno: stagToAnno(stag),
    settore: 'NUO',
    dalyob: document.getElementById('a-dalyob').value,
    alyob: document.getElementById('a-alyob').value,
    cognome: document.getElementById('a-cognome').value,
    nome: document.getElementById('a-nome').value,
    codice_gara: document.getElementById('a-codice-gara').value,
    all: '0',
    id_comitato: document.getElementById('a-comitato').value,
    limit: '20',
    id_atleta: ''
  };
  setLoading('a-btn', true, '🔍 Cerca');
  const resEl = document.getElementById('atleti-results');
  const listEl = document.getElementById('atleti-list');
  const statusEl = document.getElementById('atleti-status');
  const pagesEl = document.getElementById('atleti-pages');
  resEl.style.display = 'block';
  listEl.innerHTML = '';
  pagesEl.innerHTML = '';
  statusEl.innerHTML = '<span style="color:var(--text2)">Ricerca in corso...</span>';
  try {
    const data = await callProxy('grricerca', params, page);
    if (data.status !== 'OK') throw new Error('Risposta non valida');
    const doc = parseHTML(data.content || '');
    const athletes = [];
    doc.querySelectorAll('.row').forEach(row => {
      const el = row.querySelector('.atleta .collegamento');
      if (!el) return;
      const nascitaEl = row.querySelector('.nascita span');
      athletes.push({ nome: el.textContent.trim(), id: el.dataset.id || '', nascita: nascitaEl ? nascitaEl.textContent.trim() : '' });
    });
    statusEl.innerHTML = '<span>' + athletes.length + ' atleti trovati</span><span style="font-size:11px;color:var(--text3)">Tap per dettagli e grafico</span>';
    listEl.innerHTML = athletes.length ? athletes.map(a => `
      <div class="ath-card" onclick="openAthPage('${a.id}','${a.nome.replace(/'/g,"\\'")}','${a.nascita}')">
        <div class="ath-header">
          <div>
            <div class="ath-name">${a.nome}</div>
            <div class="ath-sub">n. ${a.nascita}</div>
          </div>
          <span class="ath-arrow">›</span>
        </div>
      </div>`).join('') : '<div class="empty"><div class="empty-icon">🏊</div>Nessun atleta trovato</div>';
    if (athletes.length >= 20) {
      pagesEl.innerHTML = `<button class="page-btn" ${page<=1?'disabled':''} onclick="searchAtleti(${page-1})">← Prec</button><span>Pag. ${page}</span><button class="page-btn" onclick="searchAtleti(${page+1})">Succ →</button>`;
    }
  } catch(e) {
    statusEl.innerHTML = '';
    listEl.innerHTML = '<div class="error-box">Errore: ' + e.message + '</div>';
  }
  setLoading('a-btn', false, '🔍 Cerca');
}

// ── ATHLETE DETAIL PAGE ──────────────────────────────────
async function openAthPage(id, nome, nascita) {
  currentAthlete = { id, nome, nascita, societa: '', pbs: [] };
  currentVasca = 50;
  currentCodice = null;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  document.getElementById('progressChart').style.display = 'none';
  document.getElementById('chart-placeholder').innerHTML = '<div class="spinner"></div><span>Carico dati atleta...</span>';
  document.getElementById('chart-placeholder').style.display = 'flex';
  document.getElementById('chart-title').textContent = 'Carico dati...';
  document.getElementById('stats-row').innerHTML = '';
  document.getElementById('results-list').style.display = 'none';
  document.getElementById('pb-grid').innerHTML = '';

  const initials = nome.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('ath-hero').innerHTML = `
    <div style="width:48px;height:48px;border-radius:50%;background:rgba(59,141,224,0.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--accent);flex-shrink:0;">${initials}</div>
    <div>
      <p style="font-size:17px;font-weight:600;margin:0 0 3px;">${nome}</p>
      <p id="ath-hero-meta" style="font-size:12px;color:var(--text2);margin:0;">n. ${nascita}</p>
    </div>`;

  document.getElementById('ath-page').classList.add('open');
  document.body.style.overflow = 'hidden';

  const stag = document.getElementById('a-stagione').value;
  const params = {
    sesso: document.getElementById('a-sesso').value || 'M',
    id_lunghezza_vasca: document.getElementById('a-vasca').value,
    kindtime: '1',
    stagione: stag === '0' ? '' : stag,
    anno: stagToAnno(stag),
    settore: 'NUO',
    cognome: nome.split(' ')[0],
    all: '0', limit: '20',
    id_atleta: id
  };
  try {
    const data = await callProxy('gratleta', params);
    const doc = parseHTML(data.content || '');
    const scheda = doc.querySelector('.scheda_atleta');
    if (scheda) {
      const soc = scheda.querySelector('.societa')?.textContent?.trim() || '';
      currentAthlete.societa = soc;
      if (soc) document.getElementById('ath-hero-meta').textContent = soc + ' · n. ' + nascita;
      const pbs = [];
      scheda.querySelectorAll('.personalbest .row').forEach(row => {
        const specEl = row.querySelector('.specialita .collegamento');
        if (!specEl) return;
        pbs.push({
          spec: specEl.textContent.trim(),
          codice: specEl.dataset.id || '',
          tempo: row.querySelector('.tempo span')?.textContent?.trim() || ''
        });
      });
      currentAthlete.pbs = pbs;
      renderPBGrid();
    }
  } catch(e) {
    document.getElementById('chart-placeholder').innerHTML = '<span style="color:var(--text2);font-size:13px;">Errore caricamento PB</span>';
  }
  document.getElementById('chart-placeholder').innerHTML = '<span style="color:var(--text2);font-size:13px;">Tap su una specialità per vedere il grafico</span>';
}

function closeAthPage() {
  document.getElementById('ath-page').classList.remove('open');
  document.body.style.overflow = '';
  if (chartInst) { chartInst.destroy(); chartInst = null; }
}

function renderPBGrid() {
  const grid = document.getElementById('pb-grid');
  grid.innerHTML = currentAthlete.pbs.map(p => `
    <div class="pb-card${p.codice === currentCodice ? ' active' : ''}" onclick="loadSpecialty('${p.codice}','${p.spec.replace(/'/g,"\\'")}')">
      <p class="pb-spec">${p.spec}</p>
      <p class="pb-time">${p.tempo || '—'}</p>
    </div>`).join('');
}

async function loadSpecialty(codice, specName) {
  if (currentCodice === codice) return;
  currentCodice = codice;
  renderPBGrid();
  document.getElementById('chart-title').textContent = specName + ' — progressione';
  document.getElementById('progressChart').style.display = 'none';
  document.getElementById('chart-placeholder').style.display = 'flex';
  document.getElementById('chart-placeholder').innerHTML = '<div class="spinner"></div><span>Carico storico...</span>';
  document.getElementById('stats-row').innerHTML = '';
  document.getElementById('results-list').style.display = 'none';
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const params = {
    sesso: document.getElementById('a-sesso').value || 'M',
    id_lunghezza_vasca: '0',
    kindtime: '1',
    stagione: '', anno: '',
    settore: 'NUO',
    codice_gara: codice,
    all: '1', limit: '100',
    id_atleta: currentAthlete.id
  };
  try {
    const data = await callProxy('grspecialitaatleta', params);
    const doc = parseHTML(data.content || '');
    const vasche = {};
    doc.querySelectorAll('.vasca').forEach(v => {
      const h4 = v.querySelector('h4')?.textContent?.trim() || '';
      const isCorta = h4.includes('25');
      const key = isCorta ? 25 : 50;
      const rows = [];
      v.querySelectorAll('.row').forEach(row => {
        const t = row.querySelector('.tempo span')?.textContent?.trim();
        const d = row.querySelector('.data span')?.textContent?.trim();
        const l = row.querySelector('.luogo .collegamento')?.textContent?.trim() || row.querySelector('.luogo span')?.textContent?.trim() || '';
        if (t && d) rows.push({ t, d: parseItalianDate(d), l });
      });
      vasche[key] = rows;
    });
    currentAthlete.vasche = vasche;
    renderChart(currentVasca, specName);
  } catch(e) {
    document.getElementById('chart-placeholder').innerHTML = '<span style="color:var(--text2);font-size:13px;">Errore: ' + e.message + '</span>';
  }
}

function setVasca(v) {
  currentVasca = v;
  document.getElementById('v50').classList.toggle('active', v === 50);
  document.getElementById('v25').classList.toggle('active', v === 25);
  if (currentCodice && currentAthlete.vasche) {
    const spec = currentAthlete.pbs.find(p => p.codice === currentCodice);
    renderChart(v, spec ? spec.spec : '');
  }
}

function renderChart(vasca, specName) {
  const raw = (currentAthlete.vasche || {})[vasca] || [];
  if (!raw.length) {
    document.getElementById('progressChart').style.display = 'none';
    document.getElementById('chart-placeholder').style.display = 'flex';
    document.getElementById('chart-placeholder').innerHTML = '<span style="color:var(--text2);font-size:13px;">Nessun dato per vasca ' + vasca + 'm</span>';
    document.getElementById('stats-row').innerHTML = '';
    document.getElementById('results-list').style.display = 'none';
    return;
  }

  const sorted = [...raw].sort((a, b) => a.d.localeCompare(b.d));
  const secVals = sorted.map(r => timeToSec(r.t)).filter(v => v !== null);
  const labels = sorted.map(r => {
    const [y,m,d] = r.d.split('-');
    return d + '/' + m + '/' + y.slice(2);
  });

  let minPB = secVals[0];
  const pbLine = secVals.map(v => { if (v <= minPB) { minPB = v; return v; } return minPB; });

  const minVal = Math.min(...secVals);
  const maxVal = Math.max(...secVals);
  const pad = (maxVal - minVal) * 0.18 + 0.5;

  document.getElementById('chart-placeholder').style.display = 'none';
  const canvas = document.getElementById('progressChart');
  canvas.style.display = 'block';

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  chartInst = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Prestazione',
          data: secVals,
          borderColor: '#3b8de0',
          backgroundColor: 'rgba(59,141,224,0.07)',
          borderWidth: 2,
          pointBackgroundColor: secVals.map(v => v === minVal ? '#22c55e' : '#3b8de0'),
          pointBorderColor: secVals.map(v => v === minVal ? '#22c55e' : '#3b8de0'),
          pointRadius: secVals.map(v => v === minVal ? 7 : 3.5),
          tension: 0.3, fill: true,
        },
        {
          label: 'PB progressivo',
          data: pbLine,
          borderColor: '#22c55e',
          borderWidth: 1.5,
          borderDash: [5, 4],
          pointRadius: 0,
          tension: 0, fill: false,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => secToTime(ctx.parsed.y) } } },
      scales: {
        y: {
          reverse: true,
          min: minVal - pad, max: maxVal + pad,
          ticks: { callback: v => secToTime(v), font: { size: 11 }, color: '#8899bb' },
          grid: { color: 'rgba(136,153,187,0.1)' }
        },
        x: { ticks: { font: { size: 10 }, color: '#8899bb', maxTicksLimit: 10, maxRotation: 45 }, grid: { display: false } }
      }
    }
  });

  const improvement = maxVal - minVal;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><p class="stat-label">Personal Best</p><p class="stat-val" style="color:var(--green)">${secToTime(minVal)}</p></div>
    <div class="stat-card"><p class="stat-label">Miglioramento</p><p class="stat-val" style="color:var(--green)">-${improvement.toFixed(2)}s</p></div>
    <div class="stat-card"><p class="stat-label">Gare registrate</p><p class="stat-val">${secVals.length}</p></div>`;

  const tbody = document.getElementById('results-body');
  tbody.innerHTML = [...sorted].reverse().map(r => {
    const sec = timeToSec(r.t);
    const isPB = sec === minVal;
    const [y,m,d] = r.d.split('-');
    return `<tr>
      <td style="color:var(--text2)">${d}/${m}/${y}</td>
      <td><span style="font-family:monospace;font-weight:500">${r.t}</span>${isPB ? '<span class="pb-badge">PB</span>' : ''}</td>
      <td style="color:var(--text2)">${r.l}</td>
    </tr>`;
  }).join('');
  document.getElementById('results-list').style.display = 'block';
}

// ── GRADUATORIE ──────────────────────────────────────────
async function searchGraduatorie(page) {
  gradPage = page;
  const stag = document.getElementById('g-stagione').value;
  const params = {
    sesso: document.getElementById('g-sesso').value,
    id_lunghezza_vasca: document.getElementById('g-vasca').value,
    kindtime: '1',
    stagione: stag === '0' ? '' : stag,
    anno: stagToAnno(stag),
    settore: 'NUO',
    dalyob: document.getElementById('g-dalyob').value,
    alyob: document.getElementById('g-alyob').value,
    codice_gara: document.getElementById('g-codice-gara').value,
    all: '0',
    id_comitato: document.getElementById('g-comitato').value,
    limit: '20', id_atleta: ''
  };
  setLoading('g-btn', true, '🏆 Cerca graduatorie');
  const resEl = document.getElementById('grad-results');
  const listEl = document.getElementById('grad-list');
  const statusEl = document.getElementById('grad-status');
  const pagesEl = document.getElementById('grad-pages');
  resEl.style.display = 'block';
  listEl.innerHTML = '';
  pagesEl.innerHTML = '';
  statusEl.innerHTML = '<span style="color:var(--text2)">Carico...</span>';
  try {
    const data = await callProxy('grricerca', params, page);
    if (data.status !== 'OK') throw new Error('Risposta non valida');
    const doc = parseHTML(data.content || '');
    const rows = [];
    doc.querySelectorAll('.row').forEach(row => {
      const gara = row.querySelector('.specialita span,.gara span')?.textContent?.trim();
      const tempo = row.querySelector('.tempo span')?.textContent?.trim();
      const atleta = row.querySelector('.atleta span,.nome span')?.textContent?.trim();
      const anno2 = row.querySelector('.nascita span,.anno span')?.textContent?.trim();
      const soc = row.querySelector('.societa span')?.textContent?.trim();
      const d = row.querySelector('.data span')?.textContent?.trim();
      const l = row.querySelector('.luogo span,.luogo .collegamento')?.textContent?.trim();
      if (tempo || atleta) rows.push({gara,tempo,atleta,anno:anno2,soc,data:d,luogo:l});
    });
    statusEl.innerHTML = '<span>' + rows.length + ' risultati</span>';
    if (rows.length) {
      listEl.innerHTML = '<div class="grad-wrap"><table><thead><tr><th>Atleta</th><th>Anno</th><th>Tempo</th><th>Luogo</th></tr></thead><tbody>' +
        rows.map(r => `<tr>
          <td style="font-weight:500">${r.atleta||''}</td>
          <td style="color:var(--text2)">${r.anno||''}</td>
          <td><span class="tempo-mono">${r.tempo||''}</span></td>
          <td style="font-size:11px;color:var(--text2)">${r.luogo||''}${r.data?'<br>'+r.data:''}</td>
        </tr>`).join('') + '</tbody></table></div>';
      if (rows.length >= 20) {
        pagesEl.innerHTML = `<button class="page-btn" ${page<=1?'disabled':''} onclick="searchGraduatorie(${page-1})">← Prec</button><span>Pag. ${page}</span><button class="page-btn" onclick="searchGraduatorie(${page+1})">Succ →</button>`;
      }
    } else {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div>Nessun risultato</div>';
    }
  } catch(e) {
    statusEl.innerHTML = '';
    listEl.innerHTML = '<div class="error-box">Errore: ' + e.message + '</div>';
  }
  setLoading('g-btn', false, '🏆 Cerca graduatorie');
}
